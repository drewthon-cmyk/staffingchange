<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings — GCK Transfer Center</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<button class="sidebar-toggle">☰</button>
<div class="sidebar-overlay"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="/assets/logo.svg" alt="USD 457"><h2>Transfer Center</h2><p>USD 457</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Employee</div>
      <a href="/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/postings.html" class="nav-item"><span class="icon">📋</span> Open Positions</a>
      <a href="/my-applications.html" class="nav-item"><span class="icon">📁</span> My Applications</a>
      <div class="nav-section">Account</div>
      <a href="/account.html" class="nav-item"><span class="icon">⚙️</span> Account Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-role">Employee</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header"><div><h1>Account Settings</h1><p>Manage your profile and password</p></div></div>
    <div class="page-body" style="max-width:640px">
      <div class="card mb-4">
        <div class="card-header"><h2>Profile Information</h2></div>
        <div class="card-body">
          <div id="profile-alert" class="alert hidden"></div>
          <form id="profileForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="name" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="text" id="email" class="form-control" disabled style="background:var(--light-gray)">
            </div>
            <div class="form-group">
              <label>Current School / Department</label>
              <select id="current_school" class="form-control"></select>
            </div>
            <div class="form-group">
              <label>Current Position / Job Title</label>
              <input type="text" id="current_position" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary" id="saveProfile">Save Changes</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Change Password</h2></div>
        <div class="card-body">
          <div id="pw-alert" class="alert hidden"></div>
          <form id="passwordForm">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="current_password" class="form-control" required>
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="new_password" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" id="savePw">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/js/app.js"></script>
<script>
const user = requireAuth();
if (user) {
  initSidebar(user);
  const schools = [
    'Garden City High School','Garden City Achieve Academy','Horace Good Middle School',
    'Kenneth Henderson Middle School','Bernadine Sitts Intermediate School',
    'Charles Stones Intermediate Center','Abe Huber Elementary','Alta Brown Elementary',
    'Buffalo Jones Elementary','Edith Sheuerman Elementary','Florence Wilson Elementary',
    'Georgia Matthews Elementary','Gertrude Walker Elementary','Jenny Berker Elementary',
    'Plymell Elementary','Victor Ornelas Elementary','Garfield Early Childhood Center',
    'Finance Department','HR Department','Curriculum and Instruction Department',
    'Nutrition Department','Health Services Department','Student Services Department',
    'Transportation Department','Plant Facilities Department',
  ];
  const sel = document.getElementById('current_school');
  schools.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

  API.get('/auth/me').then(u => {
    document.getElementById('name').value = u.name || '';
    document.getElementById('email').value = u.email;
    document.getElementById('current_position').value = u.current_position || '';
    const opt = sel.querySelector(`option[value="${u.current_school}"]`);
    if (opt) opt.selected = true;
  });

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveProfile');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    hideAlert('profile-alert');
    try {
      await API.put('/auth/me', {
        name: document.getElementById('name').value,
        current_school: document.getElementById('current_school').value,
        current_position: document.getElementById('current_position').value,
      });
      showAlert('profile-alert', 'Profile updated successfully.', 'success');
      const u = JSON.parse(localStorage.getItem('tc_user'));
      u.name = document.getElementById('name').value;
      localStorage.setItem('tc_user', JSON.stringify(u));
    } catch (err) { showAlert('profile-alert', err.message); }
    btn.disabled = false; btn.textContent = 'Save Changes';
  });

  document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('new_password').value;
    if (pw !== document.getElementById('confirm_password').value) { showAlert('pw-alert', 'Passwords do not match.'); return; }
    const btn = document.getElementById('savePw');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    hideAlert('pw-alert');
    try {
      await API.put('/auth/change-password', { current_password: document.getElementById('current_password').value, new_password: pw });
      showAlert('pw-alert', 'Password updated.', 'success');
      document.getElementById('passwordForm').reset();
    } catch (err) { showAlert('pw-alert', err.message); }
    btn.disabled = false; btn.textContent = 'Update Password';
  });
}
</script>
</body>
</html>
