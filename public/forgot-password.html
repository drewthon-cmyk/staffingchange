<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — GCK Transfer Center</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/assets/logo.svg" alt="USD 457 Logo">
      <h1>Reset Your Password</h1>
      <p>Garden City Public Schools — USD 457</p>
    </div>
    <div class="auth-body">
      <div id="alert" class="alert hidden"></div>
      <p style="color:var(--gray);font-size:.9rem;margin-bottom:20px;">Enter your district email address and we'll send you a link to reset your password.</p>
      <form id="forgotForm">
        <div class="form-group">
          <label for="email">District Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@gckschools.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">Send Reset Link</button>
      </form>
      <div class="auth-links"><a href="/">Back to Sign In</a></div>
    </div>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending…';
      alertEl.className = 'alert hidden';
      try {
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        alertEl.textContent = 'If your email is registered, a reset link has been sent. Check your inbox.';
        alertEl.className = 'alert alert-success';
        btn.textContent = 'Email Sent';
      } catch {
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.className = 'alert alert-error';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
