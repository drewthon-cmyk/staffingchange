<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications — GCK Transfer Center</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<button class="sidebar-toggle">☰</button>
<div class="sidebar-overlay"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="/assets/logo.svg" alt="USD 457"><h2>Transfer Center</h2><p>USD 457</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Employee</div>
      <a href="/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/postings.html" class="nav-item"><span class="icon">📋</span> Open Positions</a>
      <a href="/my-applications.html" class="nav-item"><span class="icon">📁</span> My Applications</a>
      <div class="nav-section">Account</div>
      <a href="/account.html" class="nav-item"><span class="icon">⚙️</span> Account Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-role">Employee</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <div><h1>My Applications</h1><p>Track all of your transfer requests</p></div>
      <a href="/postings.html" class="btn btn-primary">Apply for a Position</a>
    </div>
    <div class="page-body">
      <div id="apps-container">
        <div class="loading-overlay"><div class="spinner"></div><p>Loading…</p></div>
      </div>
    </div>
  </main>
</div>
<script src="/js/app.js"></script>
<script>
const user = requireAuth(['employee', 'principal']);
let myApps = [];

function printCert(id) {
  const a = myApps.find(x => x.id === id);
  if (!a) return;
  const isApproved = a.status === 'hr_approved';
  const color = isApproved ? '#75C044' : '#c0392b';
  const win = window.open('', '_blank', 'width=820,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Transfer Certificate</title>
<style>
  body{font-family:'Segoe UI',sans-serif;margin:0;padding:48px;color:#2F2012;background:#fff}
  .cert{border:3px solid #F8B215;border-radius:12px;padding:40px;max-width:680px;margin:0 auto}
  .cert-header{text-align:center;border-bottom:2px solid #F8B215;padding-bottom:20px;margin-bottom:28px}
  .cert-header h1{font-size:1.3rem;margin:6px 0 2px}
  .cert-header p{color:#6F655A;margin:0;font-size:.9rem}
  .cert-verdict{text-align:center;margin:0 0 28px}
  .cert-verdict h2{font-size:1.5rem;color:${color};margin:0 0 10px}
  .stamp{display:inline-block;border:4px solid ${color};color:${color};padding:6px 28px;border-radius:6px;font-size:1.3rem;font-weight:700;letter-spacing:3px;transform:rotate(-4deg)}
  .cert-row{display:flex;margin-bottom:12px;font-size:.95rem}
  .cert-row label{font-weight:700;width:170px;color:#6F655A;flex-shrink:0}
  .cert-divider{border:none;border-top:1px solid #D8D6CD;margin:20px 0}
  .cert-footer{text-align:center;font-size:.8rem;color:#6F655A;margin-top:24px}
  .cert-sig{display:flex;justify-content:space-around;margin-top:32px}
  .cert-sig div{text-align:center;width:200px}
  .cert-sig .line{border-top:1px solid #2F2012;margin-bottom:6px}
  .cert-sig p{font-size:.8rem;color:#6F655A;margin:0}
  @media print{body{padding:20px}}
</style></head><body>
<div class="cert">
  <div class="cert-header">
    <h1>Garden City Public Schools — USD 457</h1>
    <p>In-District Transfer Center &nbsp;|&nbsp; Official Transfer Record</p>
  </div>
  <div class="cert-verdict">
    <h2>${isApproved ? '✓ Transfer Approved' : '✗ Transfer Denied'}</h2>
    <div class="stamp">${isApproved ? 'APPROVED' : 'DENIED'}</div>
  </div>
  <div class="cert-row"><label>Employee</label><span>${a.employee_name}</span></div>
  <div class="cert-row"><label>Current School</label><span>${a.current_school}</span></div>
  <div class="cert-row"><label>Current Position</label><span>${a.current_position}</span></div>
  <div class="cert-row"><label>Transfer Position</label><span>${a.posting_title}</span></div>
  <div class="cert-row"><label>Transfer School</label><span>${a.school_name}</span></div>
  <div class="cert-row"><label>FTE</label><span>${a.fte}</span></div>
  <hr class="cert-divider">
  <div class="cert-sig">
    <div><div class="line"></div><p>HR Administrator Signature</p></div>
    <div><div class="line"></div><p>Date</p></div>
  </div>
  <div class="cert-footer">
    <p>Garden City Public Schools, USD 457 &nbsp;·&nbsp; In-District Transfer Center</p>
    <p>This document serves as official documentation of the transfer decision.</p>
  </div>
</div>
<script>setTimeout(()=>window.print(),400);<\/script>
</body></html>`);
  win.document.close();
}

if (user) {
  initSidebar(user);
  API.get('/applications/my').then(apps => {
    myApps = apps;
    const c = document.getElementById('apps-container');
    if (!apps.length) {
      c.innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><h3>No applications yet</h3><p>Browse open positions to start the transfer process.</p><a href="/postings.html" class="btn btn-primary mt-4">Browse Positions</a></div>`;
      return;
    }
    c.innerHTML = apps.map(a => `
      <div class="card mb-4">
        <div class="card-header">
          <div>
            <h2>${a.posting_title}</h2>
            <p class="text-gray">${a.school_name} &nbsp;|&nbsp; FTE: ${a.fte}</p>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${statusLabel(a.status)}
            <a href="/application-status.html?id=${a.id}" class="btn btn-outline btn-sm">Details</a>
            ${['hr_approved','hr_denied'].includes(a.status) ? `<button class="btn btn-outline btn-sm" onclick="printCert(${a.id})">🖨️ Certificate</button>` : ''}
          </div>
        </div>
        <div class="card-body">
          ${buildTracker(a)}
          <div class="detail-grid" style="margin-top:16px">
            <div class="detail-item"><label>Current School</label><p>${a.current_school}</p></div>
            <div class="detail-item"><label>Current Position</label><p>${a.current_position}</p></div>
            <div class="detail-item"><label>Date Applied</label><p>${formatDate(a.applied_date)}</p></div>
            ${a.interview_date ? `<div class="detail-item"><label>Interview Date</label><p>${formatDate(a.interview_date)}</p></div>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }).catch(() => {
    document.getElementById('apps-container').innerHTML = `<div class="alert alert-error">Failed to load applications.</div>`;
  });
}
</script>
</body>
</html>
