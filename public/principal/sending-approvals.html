<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sending Approvals — GCK Transfer Center</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<button class="sidebar-toggle">☰</button>
<div class="sidebar-overlay"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="/assets/logo.svg" alt="USD 457"><h2>Transfer Center</h2><p>USD 457 — Administrator</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Administrator</div>
      <a href="/principal/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/principal/sending-approvals.html" class="nav-item"><span class="icon">📤</span> Sending Approvals</a>
      <a href="/principal/receiving-approvals.html" class="nav-item"><span class="icon">📥</span> Receiving &amp; Interviews</a>
      <div class="nav-section">Account</div>
      <a href="/account.html" class="nav-item"><span class="icon">⚙️</span> Account Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <div><h1>Sending Approvals</h1><p>Employees from your building requesting a transfer</p></div>
    </div>
    <div class="page-body">
      <div class="filter-bar">
        <select id="statusFilter" class="form-control">
          <option value="">All</option>
          <option value="pending_sending_principal">Pending My Review</option>
          <option value="sending_denied">Denied by Me</option>
        </select>
      </div>
      <div id="list-container">
        <div class="loading-overlay"><div class="spinner"></div><p>Loading…</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Decision Modal -->
<div class="modal-overlay" id="decisionModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Review Transfer Request</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-app-info" style="background:var(--light-gray);border-radius:8px;padding:16px;margin-bottom:20px;font-size:.9rem"></div>
      <div id="decision-alert" class="alert hidden"></div>
      <div class="form-group">
        <label>Notes (optional — will be included in notification emails)</label>
        <textarea id="decision-notes" class="form-control" placeholder="Add any comments for the employee or HR…" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('decisionModal')">Cancel</button>
      <button class="btn btn-danger" id="btn-deny">Deny Transfer</button>
      <button class="btn btn-success" id="btn-approve">Approve Transfer</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
const user = requireAuth(['principal']);
let currentAppId = null;

if (user) {
  initSidebar(user);
  loadApps();

  document.getElementById('statusFilter').addEventListener('change', loadApps);

  function loadApps() {
    const status = document.getElementById('statusFilter').value;
    const url = status ? `/applications?status=${status}` : '/applications';
    document.getElementById('list-container').innerHTML = `<div class="loading-overlay"><div class="spinner"></div></div>`;
    API.get(url).then(apps => {
      // Only show where applicant's current school matches our building
      render(apps);
    }).catch(() => {
      document.getElementById('list-container').innerHTML = `<div class="alert alert-error">Failed to load.</div>`;
    });
  }

  function render(apps) {
    const c = document.getElementById('list-container');
    if (!apps.length) {
      c.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><h3>No requests to review</h3><p>You're all caught up.</p></div>`;
      return;
    }
    c.innerHTML = `<div class="card"><div class="table-wrapper"><table><thead><tr>
      <th>Employee</th><th>Current Position</th><th>Applying For</th><th>School</th><th>Date Applied</th><th>Status</th><th></th>
    </tr></thead><tbody>` +
    apps.map(a => `<tr>
      <td><strong>${a.employee_name}</strong></td>
      <td>${a.current_position}</td>
      <td>${a.posting_title}</td>
      <td>${a.school_name}</td>
      <td>${formatDate(a.applied_date)}</td>
      <td>${statusLabel(a.status)}</td>
      <td>
        ${a.status === 'pending_sending_principal'
          ? `<button class="btn btn-primary btn-sm" onclick="openDecision(${a.id},'${a.employee_name.replace(/'/g,"\\'")}','${a.posting_title.replace(/'/g,"\\'")}','${a.school_name.replace(/'/g,"\\'")}','${a.resume_drive_url||''}')">Review</button>`
          : `<a href="#" class="btn btn-outline btn-sm" style="cursor:default;opacity:.5">Reviewed</a>`}
      </td>
    </tr>`).join('') +
    `</tbody></table></div></div>`;
  }

  function openDecision(id, name, title, school, resumeUrl) {
    currentAppId = id;
    document.getElementById('modal-title').textContent = `Review: ${name}`;
    document.getElementById('modal-app-info').innerHTML = `
      <strong>${name}</strong> is requesting to transfer to:<br>
      <strong>${title}</strong> at ${school}
      ${resumeUrl ? `<br><a href="${resumeUrl}" target="_blank" style="color:var(--blue)">📄 View Resume</a>` : ''}
    `;
    document.getElementById('decision-notes').value = '';
    hideAlert('decision-alert');
    openModal('decisionModal');
  }
  window.openDecision = openDecision;

  async function submitDecision(approved) {
    hideAlert('decision-alert');
    const notes = document.getElementById('decision-notes').value;
    const btn = approved ? document.getElementById('btn-approve') : document.getElementById('btn-deny');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await API.post(`/workflow/${currentAppId}/sending-decision`, { approved, notes });
      btn.innerHTML = approved ? '✅ Approved!' : '✅ Decision Saved';
      btn.style.background = 'var(--green)';
      showAlert('decision-alert', approved ? 'Transfer approved successfully. The receiving principal has been notified.' : 'Transfer denied. The employee has been notified.', 'success');
      setTimeout(() => { closeModal('decisionModal'); loadApps(); }, 2000);
    } catch (err) {
      showAlert('decision-alert', err.message);
      btn.disabled = false;
      btn.textContent = approved ? 'Approve Transfer' : 'Deny Transfer';
      btn.style.background = '';
    }
  }

  document.getElementById('btn-approve').addEventListener('click', () => submitDecision(true));
  document.getElementById('btn-deny').addEventListener('click', () => submitDecision(false));
}
</script>
</body>
</html>
