<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — GCK Transfer Center</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/assets/logo.svg" alt="USD 457 Logo">
      <h1>Set New Password</h1>
      <p>Garden City Public Schools — USD 457</p>
    </div>
    <div class="auth-body">
      <div id="alert" class="alert hidden"></div>
      <form id="resetForm">
        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" class="form-control" placeholder="At least 8 characters" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" class="form-control" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">Set New Password</button>
      </form>
      <div class="auth-links"><a href="/">Back to Sign In</a></div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { document.getElementById('alert').textContent = 'Invalid reset link.'; document.getElementById('alert').className = 'alert alert-error'; document.getElementById('resetForm').style.display = 'none'; }
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.className = 'alert hidden';
      const pw = document.getElementById('new_password').value;
      if (pw !== document.getElementById('confirm_password').value) {
        alertEl.textContent = 'Passwords do not match.'; alertEl.className = 'alert alert-error'; return;
      }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
      try {
        const res = await fetch('/api/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, new_password: pw }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        alertEl.textContent = 'Password updated! Redirecting to sign in…'; alertEl.className = 'alert alert-success';
        setTimeout(() => location.href = '/', 1800);
      } catch (err) {
        alertEl.textContent = err.message; alertEl.className = 'alert alert-error';
        btn.disabled = false; btn.textContent = 'Set New Password';
      }
    });
  </script>
</body>
</html>
